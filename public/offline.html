<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#10b981" />
    <title>ResQFood Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        color: #111827;
        background: #f8fafc;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid #e5e7eb;
        border-radius: 24px;
        background: #ffffff;
        padding: 28px;
        text-align: center;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      }

      img {
        width: 72px;
        height: 72px;
        object-fit: contain;
        border-radius: 20px;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #64748b;
        line-height: 1.6;
        font-size: 14px;
      }

      a {
        display: inline-flex;
        margin-top: 22px;
        border-radius: 999px;
        background: #10b981;
        padding: 12px 18px;
        color: #ffffff;
        text-decoration: none;
        font-weight: 800;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.webp" alt="ResQFood" />
      <h1>Koneksi offline</h1>
      <p>
        ResQFood butuh koneksi internet untuk memuat menu, checkout, pembayaran,
        dan status pickup terbaru.
      </p>
      <a href="/home">Coba lagi</a>
    </main>
  </body>
</html>
